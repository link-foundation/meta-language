name: JavaScript

on:
  push:
    branches:
      - main
    paths:
      - 'js/**'
      - 'parity/**'
      - '.github/workflows/js.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'js/**'
      - 'parity/**'
      - '.github/workflows/js.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: JavaScript Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: js

      - name: Run tests
        run: npm test
        working-directory: js

      - name: Check Rust/JavaScript parity manifest
        run: npm run check:parity
        working-directory: js

      - name: Verify npm package contents
        run: npm pack --dry-run
        working-directory: js

  publish:
    name: Publish npm Package
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for trusted publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Read package metadata
        id: package
        working-directory: js
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          if [ "$name" != "meta-language" ]; then
            echo "::error::Expected package name meta-language, got $name"
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Package: $name@$version"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          normalized_tag="${RELEASE_TAG#v}"
          if [ "$normalized_tag" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match js/package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Check npm registry
        id: npm
        working-directory: js
        run: |
          if npm view meta-language@${{ steps.package.outputs.version }} version; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
        working-directory: js

      - name: Verify published package
        if: steps.npm.outputs.already_published != 'true'
        run: npm view meta-language@${{ steps.package.outputs.version }} version

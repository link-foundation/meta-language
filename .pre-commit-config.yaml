repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: local
    hooks:
      # The Rust crate lives under ./rust in the multi-language layout, so each
      # cargo/rust-script hook runs from that directory.
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd rust && cargo fmt --all --'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd rust && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false

      - id: no-src-tests
        name: reject tests in src
        entry: bash -c 'cd rust && rust-script scripts/check-no-src-tests.rs'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: bash -c 'cd rust && cargo test'
        language: system
        types: [rust]
        pass_filenames: false

      # The JavaScript package lives under ./js.
      - id: js-test
        name: javascript tests
        entry: bash -c 'cd js && npm test'
        language: system
        files: ^js/
        pass_filenames: false

      # Enforce the Rust <-> JavaScript feature parity manifest on every commit
      # that touches either language or the manifest itself.
      - id: parity-manifest
        name: rust/javascript parity manifest
        entry: node js/scripts/check-js-rust-parity.mjs --manifest-only
        language: system
        files: ^(rust/|js/|parity/)
        pass_filenames: false
